<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Flow Monitoring System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --ink:#16202c; --sub:#64748b; --line:#e5eaf0; --bg:#eef1f5; --card:#ffffff;
    --blue:#2563eb; --amber:#d97706; --green:#16a34a; --red:#dc2626;
    --green-soft:#a5d6b7; --accent:#0f4c81;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5}
  .wrap{max-width:1240px; margin:0 auto; padding:24px 20px 80px}

  header{margin-bottom:22px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap}
  h1{font-size:23px; font-weight:800; letter-spacing:-0.02em}
  .boot{font-size:13px; color:var(--sub)}

  .sec-title{font-size:15px; font-weight:800; margin:28px 0 14px; display:flex; align-items:center; gap:8px}
  .sec-title::before{content:""; width:4px; height:16px; background:var(--accent); border-radius:2px}
  .sec-title .muted{font-weight:600; color:var(--sub); font-size:12px}

  /* 종합 4카드 */
  .cards{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; position:relative; overflow:hidden}
  .card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px}
  .card.total::before{background:var(--blue)} .card.wait::before{background:var(--amber)}
  .card.done::before{background:var(--green)} .card.unpaid::before{background:var(--red)}
  .card .label{font-size:12.5px; color:var(--sub); font-weight:600}
  .card .value{font-size:21px; font-weight:800; margin-top:8px; letter-spacing:-0.02em}
  .card .value small{font-size:12px; font-weight:600; color:var(--sub)}

  /* 고객사 카드 (동적) */
  .ccards{display:grid; grid-template-columns:repeat(4,1fr); gap:14px}
  .ccard{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .ccard-name{background:var(--accent); color:#fff; font-weight:800; font-size:14px; padding:10px 16px}
  .ccard-nums{padding:12px 16px; display:flex; flex-direction:column; gap:7px}
  .ccard-nums>div{display:flex; justify-content:space-between; align-items:baseline}
  .ccard-lbl{font-size:12px; color:var(--sub)}
  .ccard-val{font-size:14px; font-weight:700}
  .ccard-val.neg{color:var(--red)} .ccard-val.pos{color:var(--green)}

  .chart-box{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; height:340px}

  /* 프로젝트 진행율 */
  .proj-head{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 20px; display:flex; align-items:center; gap:20px; margin-bottom:14px}
  .proj-overall{font-size:34px; font-weight:800; color:var(--accent); line-height:1}
  .proj-overall-label{font-size:13px; color:var(--sub); font-weight:600}
  .proj-overall-sub{font-size:12px; color:var(--sub); margin-top:2px}
  .proj-list{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:8px 18px}
  .prow{padding:12px 0; border-bottom:1px solid var(--line)}
  .prow:last-child{border-bottom:none}
  .prow-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
  .prow-name{font-size:13.5px; font-weight:600}
  .prow-cust{font-size:11.5px; color:var(--sub); background:#eef2f7; padding:2px 8px; border-radius:20px}
  .pbar{position:relative; height:26px; background:#e8f5ec; border-radius:6px; overflow:hidden}
  .pbar-fill{position:absolute; left:0; top:0; bottom:0; background:var(--green); border-radius:6px 0 0 6px; transition:width .5s}
  .pbar-txt{position:absolute; right:10px; top:0; bottom:0; display:flex; align-items:center; font-size:11.5px; font-weight:700; color:var(--ink)}

  /* 표 */
  .table-box{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:auto; margin-top:14px}
  table{width:100%; border-collapse:collapse; font-size:13px; min-width:480px}
  th,td{padding:11px 16px; text-align:right; white-space:nowrap}
  th{background:#f0f4f8; color:var(--sub); font-weight:700; font-size:12px}
  th:first-child,td:first-child{text-align:left; font-weight:600}
  tbody tr{border-top:1px solid var(--line)}
  .num-total{color:var(--blue)} .num-done{color:var(--green)}

  /* 저장 파일 목록 */
  .saved{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px}
  .sf-row{display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 0; border-bottom:1px solid var(--line)}
  .sf-row:last-child{border-bottom:none}
  .sf-name{word-break:break-all}
  .badge{font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; background:#e0edf7; color:var(--accent); white-space:nowrap; margin-left:auto}

  .empty{color:var(--sub); text-align:center; padding:50px; font-size:14px; background:var(--card); border:1px dashed var(--line); border-radius:14px}
  .hidden{display:none}

  @media(max-width:860px){
    .cards,.ccards{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:520px){
    .cards,.ccards{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Cash Flow Monitoring System</h1>
    <span class="boot" id="boot-status">불러오는 중...</span>
  </header>

  <div id="empty-note" class="empty hidden">
    아직 저장된 데이터가 없습니다.<br>
    GitHub 저장소의 <b>data</b> 폴더에 월별 엑셀 파일을 올리면 여기에 표시됩니다.
  </div>

  <div id="dashboard" class="hidden">

    <!-- 1. 종합 -->
    <div class="sec-title">종합 현황 <span class="muted">최신 파일 기준</span></div>
    <div class="cards">
      <div class="card total"><div class="label">총수주금액</div><div class="value" id="s-total">-</div></div>
      <div class="card wait"><div class="label">수금대기 <small>(세금계산서 발행)</small></div><div class="value" id="s-wait">-</div></div>
      <div class="card done"><div class="label">수금완료 <small>(수금액 합계)</small></div><div class="value" id="s-done">-</div></div>
      <div class="card unpaid"><div class="label">현 미수금 <small>(미결제TC)</small></div><div class="value" id="s-unpaid">-</div></div>
    </div>

    <!-- 2. 고객사 카드 -->
    <div class="sec-title">고객사별 현황</div>
    <div class="ccards" id="cust-cards"></div>

    <!-- 3. 고객사별 막대 -->
    <div class="sec-title">고객사별 세금계산서 발행 vs 실제 수금</div>
    <div class="chart-box"><canvas id="custChart"></canvas></div>

    <!-- 4. 프로젝트 진행율 -->
    <div class="sec-title">프로젝트 진행율 <span class="muted">수주금액 대비 수금액</span></div>
    <div class="proj-head">
      <div>
        <div class="proj-overall" id="proj-overall">-</div>
      </div>
      <div>
        <div class="proj-overall-label">전체 진행율</div>
        <div class="proj-overall-sub" id="proj-overall-sub"></div>
      </div>
    </div>
    <div class="proj-list" id="proj-list"></div>

    <!-- 5. 월별 추이 -->
    <div class="sec-title">월별 수금 추이</div>
    <div class="chart-box"><canvas id="monthChart"></canvas></div>
    <div class="table-box">
      <table id="month-table">
        <thead><tr><th>월</th><th>그 달 수금액</th><th>누적 수금완료</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 6. 저장 파일 -->
    <div class="sec-title">저장된 데이터 파일 <span class="muted" id="saved-count"></span></div>
    <div class="saved" id="saved-list"></div>

  </div>
</div>

<script src="app3.js"></script>
</body>
</html>
